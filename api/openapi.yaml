          description: Rate limit exceeded — retry after the `Retry-After` interval.
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: An unexpected error on our side.
      summary: Create a domain
      tags:
      - Domains
