openapi: 3.1.1
info:
  description: |-
    The **Norbelys API** is a single, predictable REST surface for cold email and
    outreach — people, senders, programs, and sending all live behind the five
    patterns below. Developer-first and AI-first: every name is either already
    invented (Schema.org) or obvious.

    ## Authentication

    Every request authenticates with an **org-scoped API key**. Create one in
    **Settings → API keys** and send it as a bearer token:

    ```http
    GET https://api.norbelys.com/v1/people
    Authorization: Bearer ak_live_…
    ```

    Interactive agents may instead use OAuth 2.1 (see `/auth.md` and the
    `/.well-known/oauth-protected-resource` metadata).

    ## Conventions

    - **Base URL** — `https://api.norbelys.com/v1`.
    - **JSON in, JSON out.** Timestamps are ISO-8601 in UTC.
    - **Cursor pagination.** List endpoints take `limit` + `cursor` and return
      `{ data, hasMore, nextCursor }` (offset-paged tables add `page` + `total`).
    - **Expansions.** Detail GETs take an `expand[]` query param to inline related
      data (e.g. `GET /people/{id}?expand[]=timeline`) instead of extra calls.
    - **Soft deletes.** Anything that has been used is archived, never hard-deleted —
      `DELETE` archives the resource and returns it.

    ## Errors

    Failures return the same envelope on every 4xx/5xx, with the matching HTTP status:

    ```json
    { "error": { "type": "invalid_request", "code": "invalid_param",
                "message": "…", "hint": "…", "doc_url": "…" } }
    ```

    `type` is a broad, machine-routable category derived from the status; `code` is the
    stable machine contract you branch on (never the human `message`). See the `Error`
    schema.

    ## Idempotency

    Every `POST` accepts an optional **`Idempotency-Key`** header. Reuse the same key to
    replay the original result for 24h instead of re-executing — so a retried create can
    never double-charge or duplicate a record.

    ## Rate limits & versioning

    Abuse control is enforced at the edge; responses advertise the policy via the
    `RateLimit-Policy` header, and a `429` carries `Retry-After`. The API is versioned in
    the URL path (`/v1`). Breaking changes ship under a new version; a retiring surface is
    announced with `Deprecation` + `Sunset` response headers at least 90 days ahead.
  title: Norbelys API
  version: 0.0.1
servers:
- description: Production
  url: https://api.norbelys.com/v1
security:
- bearerAuth: []
tags:
- description: Your workspace — profile and onboarding state.
  name: Organization
- description: "The people you reach out to: create, import, segment, and read a person's\
    \ timeline."
  name: People
- description: Custom person fields — the tenant-defined attributes that ride on every
    person under `customFields`.
  name: Fields
- description: Static lists of people — hand-curated audiences you add to and remove
    from.
  name: Groups
- description: Saved audience filters — dynamic rule-trees evaluated live against
    your people.
  name: Segments
- description: Connected mailboxes that send your email — the sending identity behind
    each program.
  name: Senders
- description: "Every domain concern in one place: sending domains (verification,\
    \ DNS records, daily caps) and DMARC monitoring (collection addresses, ingested\
    \ reports)."
  name: Domains
- description: "Campaigns and sequences — with their steps, variants and enrollments\
    \ nested underneath."
  name: Programs
- description: "Send email through the unified send door, read the unified sent/received\
    \ log, and fetch a message's exact sent source."
  name: Messages
- description: "The one analytics door: named catalog queries (funnels, feeds, health,\
    \ A/B, DMARC) over the event store."
  name: Analytics
- description: "Addresses excluded from sending — unsubscribes, bounces, and complaints."
  name: Suppressions
- description: "Connected tools (Slack, CRMs): mint a Connect session, configure notifications,\
    \ disconnect."
  name: Integrations
- description: "Synchronous email verification — deliverability, reachability, and\
    \ identity signals for an address."
  name: Verify
- name: Files
paths:
  /analytics/query:
    post:
      description: "The ONE read door for all event-derived analytics — choose a named\
        \ `query` from the catalog and pass its `params`; the tenant is auto-scoped\
        \ (you can never read another org). Returns flat rows + a count. Covers activity\
        \ feeds, message/person event traces, time-series, campaign funnels, sender\
        \ & inbox-provider health, A/B performance, warmup placement, and DMARC rollups.\
        \ The `query` field documents the full catalog and which params each one takes."
      operationId: analytics.query
      parameters:
      - description: "Opt-in idempotency for a safely retried write: reuse the same\
          \ key to replay the original result for 24h instead of re-executing. Recommended\
          \ on every POST."
        explode: false
        in: header
        name: Idempotency-Key
        required: false
        schema:
          maxLength: 255
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnalyticsQuery'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyticsQueryResult'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: The request was malformed or failed validation.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Missing or invalid credentials.
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: "Authenticated, but not permitted."
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: No such resource (or it has been archived).
        "409":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: The request conflicts with the resource's current state.
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Well-formed but semantically invalid.
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Rate limit exceeded — retry after the `Retry-After` interval.
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: An unexpected error on our side.
      summary: Run an analytics query
      tags:
      - Analytics
  /domains:
    get:
      description: "List your domains — both sending domains and DMARC-monitoring\
        \ domains. Filter by capability, or pass programId to scope to the sending\
        \ domains a campaign sends from (adds senderCount)."
      operationId: domains.list
      parameters:
      - allowEmptyValue: true
        allowReserved: true
        explode: true
        in: query
        name: cursor
        required: false
        schema:
          description: "Opaque cursor from a previous page's `nextCursor` — returns\
            \ results strictly after it. Example: \"con_x7q2m9k4w8r1\""
          type: string
        style: form
      - allowEmptyValue: true
        allowReserved: true
        explode: true
        in: query
        name: includeArchived
        required: false
        schema:
          description: "Include archived rows in the results (hidden by default).\
            \ Example: true"
          type: boolean
        style: form
      - allowEmptyValue: true
        allowReserved: true
        explode: true
        in: query
        name: limit
        required: false
        schema:
          description: "Page size, 1-100. Defaults to 50. Example: 25"
          maximum: 100
          minimum: 1
          type: integer
        style: form
      - allowEmptyValue: true
        allowReserved: true
        explode: true
        in: query
        name: capability
        required: false
        schema:
          description: "Only rows with this capability: `sending`, `monitoring`, or\
            \ `tracking`."
          enum:
          - sending
          - monitoring
          - tracking
          type: string
        style: form
      - allowEmptyValue: true
        allowReserved: true
        explode: true
        in: query
        name: programId
        required: false
        schema:
          description: Only the sending domains this campaign's mailboxes live under
            (adds `senderCount`).
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainList'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: The request was malformed or failed validation.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Missing or invalid credentials.
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: "Authenticated, but not permitted."
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: No such resource (or it has been archived).
        "409":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: The request conflicts with the resource's current state.
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Well-formed but semantically invalid.
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Rate limit exceeded — retry after the `Retry-After` interval.
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: An unexpected error on our side.
      summary: List domains
      tags:
      - Domains
    post:
      description: "Provision a domain by capability. A `sending` domain registers\
        \ a cold/SMTP mailbox domain (normally born automatically when you connect\
        \ a mailbox); a `monitoring` domain starts DMARC monitoring and auto-mints\
        \ its first collection address (read it back with find?expand[]=collectionAddresses).\
        \ The common manual use is adding an external monitor-only domain."
      operationId: domains.create
      parameters:
      - description: "Opt-in idempotency for a safely retried write: reuse the same\
          \ key to replay the original result for 24h instead of re-executing. Recommended\
          \ on every POST."
        explode: false
        in: header
        name: Idempotency-Key
        required: false
        schema:
