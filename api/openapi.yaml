          description: An unexpected error on our side.
      summary: Get a domain
      tags:
      - Domains
    patch:
      description: "Update customer-owned settings on a sending or tracking domain.\
        \ Operational DNS, TLS, health, recommendation, and capacity fields are read-only.\
        \ The required version provides optimistic concurrency."
      operationId: domains.update
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          description: The domain id (path).
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DomainUpdateParams'
        required: true
      responses:
