    VerifyReachability:
      description: "The single deliverability verdict. \"safe\" = the mailbox was\
        \ positively confirmed (rarely returned); \"risky\" = routable but low quality\
        \ — a spam-listed domain, a role/shared inbox, or an accept-all domain; \"\
        invalid\" = undeliverable — bad syntax, an unregistrable TLD, a disposable\
        \ domain, no mail server, or a previously bounced address; \"unknown\" = a\
        \ deliverable-looking address whose mailbox could not be confirmed without\
        \ sending (the common default)."
      enum:
      - safe
      - risky
      - invalid
      - unknown
      title: VerifyReachability
      type: string
    VerifyReasonCode:
      description: "Stable machine-readable code for the dominant reason (the companion\
        \ to the prose `reason`). Values: invalid_syntax (not a valid address format)\
        \ · typo_suspected (a likely correction exists — see `suggestedCorrection`)\
        \ · invalid_tld (the domain suffix is not a registrable IANA/public-suffix\
        \ entry) · disposable (throwaway / temp-mail domain) · no_mail_server (the\
        \ domain has no MX) · previously_bounced (a real send to this address hard-bounced\
        \ before — it WILL bounce again) · spam_listed (the domain is on a spam/abuse\
        \ blocklist) · undeliverable (an external check rejected the mailbox) · accept_all\
        \ (the domain accepts mail for any local part) · risky_tld (on a frequently-abused\
        \ TLD and not reputable) · gibberish_local (the local part looks random) ·\
        \ role_account (a role / shared inbox like info@ or sales@) · deliverable\
        \ (an external check confirmed the mailbox) · deliverable_unconfirmed (deliverable\
        \ format on a domain that accepts mail, mailbox not confirmed)."
      enum:
      - invalid_syntax
      - typo_suspected
      - invalid_tld
      - disposable
      - no_mail_server
      - previously_bounced
      - spam_listed
      - undeliverable
      - accept_all
      - risky_tld
      - gibberish_local
      - role_account
      - deliverable
      - deliverable_unconfirmed
      title: VerifyReasonCode
      type: string
    VerifySignals:
      description: The individual quality signals behind the verdict.
      example:
        isReputable: true
        isDisposable: true
        isFreeEmail: true
        isGibberish: true
        isRoleAccount: true
        isSpamDomain: true
      properties:
        isDisposable:
          description: Domain is a known disposable / temporary-mail provider.
          type: boolean
        isFreeEmail:
          description: "Domain is a consumer webmail provider (gmail, outlook, …)."
          type: boolean
        isGibberish:
          description: The local part looks like random characters — likely not a
            real person's mailbox.
          type: boolean
        isReputable:
          description: Domain is among the reputable top domains — a positive trust
            signal.
          type: boolean
        isRoleAccount:
          description: "Local part is a role account (e.g. \"info\", \"support\")."
          type: boolean
        isSpamDomain:
          description: Domain is on a spam/abuse blocklist — a reputation hazard to
            send to.
          type: boolean
      required:
      - isDisposable
      - isFreeEmail
      - isGibberish
      - isReputable
      - isRoleAccount
      - isSpamDomain
      title: VerifySignals
    VerifySyntax:
      description: Syntax checks.
      example:
        localPart: localPart
        domain: domain
        isValidSyntax: true
      properties:
        domain:
          description: The domain part of the address.
          type: string
        isValidSyntax:
          description: RFC 5321/5322 syntactic validity.
          type: boolean
        localPart:
          description: The local part of the address (before the @).
          type: string
      required:
      - domain
      - isValidSyntax
      - localPart
      title: VerifySyntax
    Error_error:
      example:
        doc_url: https://openapi-generator.tech
        code: invalid_param
        hint: hint
        message: message
        type: type
      properties:
        code:
          description: "Stable machine code — branch on this, never on the human `message`."
          enum:
          - invalid_param
          - missing_param
          - invalid_expand
          - duplicate_email
          - already_exists
          - unauthorized
          - forbidden
          - mailbox_already_connected
          - suppression_protected
          - program_not_launchable
          - database_unavailable
          - rate_limited
          - idempotency_key_reuse
          - idempotency_in_progress
          type: string
        doc_url:
          description: Optional link to the relevant documentation.
          format: uri
          type: string
        hint:
          description: Optional one-sentence remediation.
          type: string
        message:
          description: Human-readable explanation. Never a contract.
          type: string
        type:
          description: "Broad, machine-routable category derived from the HTTP status."
          type: string
      required:
