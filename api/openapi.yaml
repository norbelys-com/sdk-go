                $ref: '#/components/schemas/Error'
          description: Rate limit exceeded — retry after the `Retry-After` interval.
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: An unexpected error on our side.
      summary: Archive a domain
      tags:
      - Domains
    get:
      description: "Read one domain (a monitoring domain reports its DMARC collection\
        \ readiness on read). Pass expand[]=collectionAddresses to inline the rua\
        \ addresses reports are sent to."
      operationId: domains.find
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          description: The domain id (path).
          type: string
        style: simple
      - allowEmptyValue: true
        allowReserved: true
        explode: true
