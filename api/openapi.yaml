components:
  schemas:
    Error:
      example:
        error:
          doc_url: https://openapi-generator.tech
          code: invalid_param
          hint: hint
          message: message
          type: type
      properties:
        error:
          $ref: '#/components/schemas/Error_error'
      required:
      - error
    AnalyticsQuery:
      example:
        query: activity_feed
        params:
          activity: activity
          offset: 0
          receiver: receiver
          orderBy: orderBy
          excludeMachine: true
          program: program
          thread: thread
          dir: asc
          type: type
          search: search
          sender: sender
          person: person
          domain: domain
          limit: 603
          days: 30
          until: until
          since: since
      properties:
        params:
          $ref: '#/components/schemas/AnalyticsQuery_params'
        query:
          $ref: '#/components/schemas/AnalyticsQueryName'
      required:
      - query
      title: AnalyticsQuery
    AnalyticsQueryName:
      description: |-
        The named query to run. Catalog (query — what it returns; key params):
        activity_feed — account-wide event feed (sent/open/click/reply/bounce); filter/search/page.
        agent_trace — the AI assistant's per-turn action trace (tools, durations, outcomes); params.thread optional.
        message_events — every event for one outbound message; needs params.activity.
        contact_events — one person's engagement history; needs params.person.
        events_timeseries — event counts bucketed by time.
        program_funnel — engagement funnel (sent→delivered→opened→replied), one row; params.program for one campaign, else the whole account.
        program_funnels — the same funnel grouped per campaign (one row per program_id).
        sender_breakdown — per-mailbox breakdown within a campaign; params.program.
        sender_health — mailbox deliverability rollup (7d); params.sender.
        variant_performance — A/B arm performance per step; params.program.
        provider_breakdown — outcomes by the sending transport (SMTP / managed API…).
        deliverability_summary — account deliverability headline over a window.
        inbox_providers — outcomes by the recipient's inbox provider (Gmail/Microsoft/Yahoo…).
        warmup_placement — inbox-vs-spam placement for one mailbox; params.sender.
        dmarc_summary — DMARC pass/fail rollup; needs params.domain.
        dmarc_sources — DMARC failure sources (IPs/services); needs params.domain.
        dmarc_reports — ingested DMARC aggregate reports; params.domain optional (omit for account-wide).
        dmarc_receivers — DMARC reporters (receivers) rollup; params.domain optional.
        dmarc_geo — DMARC volume by source network country; params.domain optional.
        open_quality_timeseries — daily opens by human-vs-machine verdict; params.program/params.sender optional.
        engagement_heatmap — engagement density by weekday × hour (best send time).
        clicks_by_country — real click engagement by recipient country.
        spam_placement — graded spam-placement verdict per sender.
        delivery_authentication — sent vs DMARC-reported (passed/quarantined/rejected) per domain.
      enum:
      - activity_feed
      - agent_trace
      - message_events
      - contact_events
      - events_timeseries
      - program_funnel
      - program_funnels
      - sender_breakdown
      - sender_health
      - variant_performance
      - provider_breakdown
      - deliverability_summary
      - inbox_providers
      - warmup_placement
      - warmup_placement_by_provider
      - dmarc_summary
      - dmarc_sources
      - dmarc_reports
      - dmarc_receivers
      - dmarc_geo
      - open_quality_timeseries
      - engagement_heatmap
      - clicks_by_country
      - spam_placement
      - delivery_authentication
      title: AnalyticsQueryName
      type: string
    AnalyticsQueryResult:
      example:
        data:
        - key: ""
        - key: ""
        rows: 0
      properties:
        data:
          description: "The result rows, one flat object per row."
          items:
            additionalProperties: {}
          type: array
        rows:
          description: Number of rows returned.
          minimum: 0
          type: integer
      required:
      - data
      - rows
      title: AnalyticsQueryResult
    DomainList:
      example:
        nextCursor: nextCursor
        total: 0
        data:
        - createdAt: ""
          capability: sending
          domain: domain
          sending:
            defaultTrackingDomainId: defaultTrackingDomainId
            health:
              recommendedAction: none
              reasons:
              - reasons
              - reasons
              state: unknown
              updatedAt: ""
            capacity:
              domainRemaining: 0
              mailboxCapacity: 0
