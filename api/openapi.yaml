      - message
      - type
    AnalyticsQuery_params:
      description: Query parameters; each query reads the subset it supports.
      example:
        activity: activity
        offset: 0
        receiver: receiver
        orderBy: orderBy
        excludeMachine: true
        program: program
        thread: thread
        dir: asc
        type: type
        search: search
        sender: sender
        person: person
        domain: domain
        limit: 603
        days: 30
        until: until
        since: since
      properties:
        activity:
          description: The outbound message id. Required by the message_events query;
            returns every event for that one send.
          type: string
        days:
          description: Lookback window in days (alternative to since/until).
          maximum: 365
          minimum: 1
          type: integer
        dir:
          description: Sort direction for activity_feed (default desc).
          enum:
          - asc
          - desc
          type: string
        domain:
          description: "The monitored domain name. Required by dmarc_summary / dmarc_sources;\
            \ optional on dmarc_reports / dmarc_receivers — omit for the account-wide\
            \ feed. Example: acme.com"
          type: string
        excludeMachine:
          description: "activity_feed only: exclude machine-generated engagement —\
            \ opens not classified as human (e.g. automated inbox prefetches) and\
            \ any bot-classified event."
          type: boolean
        limit:
          description: Max rows returned.
          maximum: 1000
          minimum: 1
          type: integer
        offset:
          description: Rows to skip (activity_feed paging).
          minimum: 0
          type: integer
        orderBy:
          description: "Sort column for activity_feed. Example: occurred_at"
          type: string
        person:
          description: "Scope to one person (person id). Used by: contact_events."
          type: string
        program:
          description: "Scope to one campaign (program id). Used by: activity_feed,\
            \ program_funnel, sender_breakdown, variant_performance."
          type: string
        receiver:
          description: "Narrow the DMARC queries to ONE reporter (receiver) — 'show\
            \ me only what Gmail saw'. Used by: dmarc_summary, dmarc_sources, dmarc_geo,\
            \ dmarc_reports."
          type: string
        search:
          description: "Free-text search (activity_feed: matches recipient/subject)."
          type: string
        sender:
          description: "Scope to one sender — by id (\"snd_…\") or by its from address\
            \ (\"receipts@hola.com\"); both filter identically. Used by: activity_feed,\
            \ sender_health, warmup_placement."
          type: string
        since:
          description: Window start (ISO 8601). Most queries default to the last 30
            days.
          type: string
        thread:
          description: A conversation (thread) id — narrows agent_trace to one conversation.
          type: string
        type:
          description: Filter to one event type.
          type: string
        until:
          description: Window end (ISO 8601).
          type: string
    DomainCreateParams_monitoring:
      description: Monitoring options (capability "monitoring" only).
      example:
        kind: external
        sendingDomainId: sendingDomainId
      properties:
        kind:
          default: external
          description: "What the monitored domain is: `sending` (one of our own) or\
            \ `external` (monitor-only). Defaults to `external`."
          enum:
          - sending
          - external
          type: string
        sendingDomainId:
          nullable: true
          type: string
    DomainCreateParams_tracking:
      description: Tracking options (capability "tracking" only).
      example:
        isOrganizationDefault: false
        label: label
        assignedSendingDomainIds:
        - assignedSendingDomainIds
        - assignedSendingDomainIds
      properties:
        assignedSendingDomainIds:
          default: []
          description: Sending domains to route through this tracking hostname. Defaults
            to an empty list.
          items:
            type: string
          type: array
        isOrganizationDefault:
          default: false
          description: Make this the organization's default tracking domain. Defaults
            to false.
          type: boolean
        label:
          description: Optional operator-facing label for this tracking domain.
          maxLength: 100
          minLength: 1
          type: string
    DomainUpdateParams_sending_policy:
      description: Editable daily-budget policy — include only the fields you want
        to change (read-only caps are omitted).
      example:
        mode: legacy
        autopilotMin: 0
        autopilotMax: 0
        allowPauseFirstTouches: true
        timezone: timezone
        maxDailyGrowthPercent: 59
        allowPauseAll: true
        configuredDailyCap: 0
      properties:
        allowPauseAll:
          description: Whether the platform may pause ALL sends from this domain when
            health is critical.
          type: boolean
        allowPauseFirstTouches:
          description: Whether the platform may pause first-touch (cold) sends while
            replies keep flowing.
          type: boolean
        autopilotMax:
          minimum: 0
          nullable: true
          type: integer
        autopilotMin:
          minimum: 0
          nullable: true
          type: integer
        configuredDailyCap:
          minimum: 0
          nullable: true
          type: integer
        maxDailyGrowthPercent:
          maximum: 100
          minimum: 0
          nullable: true
          type: integer
        mode:
          description: "Budget control mode: `legacy`, `manual`, or `autopilot`."
          enum:
          - legacy
          - manual
          - autopilot
          type: string
        timezone:
          description: IANA timezone the daily window and reset are computed in.
          type: string
    DomainUpdateParams_sending:
      description: Editable sending-domain settings (policy + default tracking).
      example:
        defaultTrackingDomainId: defaultTrackingDomainId
        policy:
          mode: legacy
          autopilotMin: 0
          autopilotMax: 0
          allowPauseFirstTouches: true
          timezone: timezone
          maxDailyGrowthPercent: 59
          allowPauseAll: true
          configuredDailyCap: 0
      properties:
        defaultTrackingDomainId:
          nullable: true
          type: string
        policy:
          $ref: '#/components/schemas/DomainUpdateParams_sending_policy'
    DomainUpdateParams_tracking:
      description: Editable tracking-domain settings.
      example:
        desiredState: active
        isOrganizationDefault: true
        label: label
        assignedSendingDomainIds:
        - assignedSendingDomainIds
        - assignedSendingDomainIds
      properties:
        assignedSendingDomainIds:
          description: Replace the set of sending domains routed through this tracking
            hostname.
          items:
            type: string
          type: array
        desiredState:
          description: "Set the target state: `active` or `disabled`."
          enum:
          - active
          - disabled
          type: string
        isOrganizationDefault:
          description: Make this the organization's default tracking domain.
          type: boolean
        label:
          maxLength: 100
          minLength: 1
          nullable: true
          type: string
    IntegrationConfig_notify:
      description: Per-outcome notification toggles.
      example:
        meetingBooked: true
        reply: true
        campaignAutoPaused: true
        positiveReply: true
      properties:
        campaignAutoPaused:
          description: Notify when a campaign auto-pauses (e.g. its bounce-rate gate
            trips); on by default.
          type: boolean
        meetingBooked:
          description: Notify when a meeting is booked; on by default.
          type: boolean
        positiveReply:
          description: Notify when an incoming reply is classified as positive; on
