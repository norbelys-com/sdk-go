    post:
      description: "Synchronously check whether one email address is deliverable.\
        \ The `reachability` verdict is the headline outcome: `safe` (the mailbox\
        \ was positively confirmed — requires an external escalation, so rarely returned\
        \ today), `risky` (routable but low quality, such as a spam-listed domain\
        \ or a role/shared inbox), `invalid` (undeliverable: bad syntax, no mail server,\
        \ a disposable domain, or an address that hard-bounced on a real send before),\
        \ or `unknown` (deliverable-looking but not confirmed without sending, the\
        \ common default). It also returns a 0–100 `score`, a stable `reasonCode`\
        \ twinned with the prose `reason`, a `suggestedCorrection` for likely typos,\
        \ and the `syntax`/`mx`/`signals` evidence. The result is computed per request:\
        \ it is not stored and has no id."
