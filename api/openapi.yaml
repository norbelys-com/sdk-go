      - op
      title: AudienceAttributeCondition
    AudienceConditionOp:
      description: "The comparison operator. Equality/set: `eq`, `neq`, `in`, `not_in`.\
        \ Text: `contains`, `not_contains`, `starts_with`, `ends_with`. Numeric: `gt`,\
        \ `gte`, `lt`, `lte`, `between`. Presence: `exists`, `not_exists`. Date: `before`,\
        \ `after`, `within_days`, `more_than_days_ago`. Boolean: `is_true`, `is_false`.\
        \ The valid set depends on the field's kind."
      enum:
      - eq
      - neq
      - in
      - not_in
      - contains
      - not_contains
      - starts_with
      - ends_with
      - gt
      - gte
      - lt
      - lte
      - between
      - exists
      - not_exists
      - before
      - after
      - within_days
      - more_than_days_ago
      - is_true
      - is_false
      title: AudienceConditionOp
      type: string
    AudienceActivityCondition:
      properties:
        activity:
          $ref: '#/components/schemas/AudienceActivityParams'
        did:
          default: true
          description: '`true` = the person DID this at least once; `false` = the
            person did NOT (zero times).'
          type: boolean
      required:
      - activity
      title: AudienceActivityCondition
    AudienceActivityParams:
      description: The engagement to test — action + optional campaign/step/variant/link
        scope + time window.
      properties:
        action:
          $ref: '#/components/schemas/AudienceActivityAction'
        after:
          description: Only count activity at/after this instant (epoch milliseconds).
          type: number
        before:
          description: Only count activity before this instant (epoch milliseconds).
          type: number
        campaignIds:
          description: Scope to these campaigns (matches ANY of them). Omit for activity
            in any campaign.
          items:
            type: string
          maxItems: 20
          type: array
        link:
          $ref: '#/components/schemas/AudienceActivityParams_link'
        stepIds:
          description: Scope to these cadence steps (matches ANY of them).
          items:
            type: string
          maxItems: 20
          type: array
        variantIds:
          description: Scope to these A/B variants (matches ANY of them).
          items:
            type: string
          maxItems: 20
          type: array
        withinDays:
          description: Only count activity in the last N days.
          maximum: 730
          type: integer
      required:
      - action
      title: AudienceActivityParams
    AudienceActivityAction:
      description: "What the person did: `sent` (a message went out to them), `opened`\
        \ (a human open — automated machine opens are not counted), `clicked` (a human\
        \ click on a tracked link), `replied`, `bounced` (a hard bounce), `unsubscribed`,\
        \ or `spam` (a spam complaint or a spam-related delivery block)."
      enum:
      - sent
      - opened
      - clicked
      - replied
      - bounced
      - unsubscribed
      - spam
      title: AudienceActivityAction
      type: string
    AudienceActivityLinkMatchOp:
      description: '`contains` = substring match; `eq` = the exact URL.'
      enum:
      - contains
      - eq
      title: AudienceActivityLinkMatchOp
      type: string
    AudienceMatch:
      default: all
      description: '"all" = match every condition (AND); "any" = match any (OR).'
      enum:
      - all
      - any
      title: AudienceMatch
      type: string
